name: Daily Container Build

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: docker build -t html-anything:latest .

      - name: Run container
        run: |
          docker run -d \
            --name html-anything \
            -p 3000:3000 \
            html-anything:latest

      - name: Wait for app and health-check
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              echo "App is responding on :3000"
              exit 0
            fi
            sleep 2
          done
          echo "App failed to start"
          docker logs html-anything
          exit 1

      - name: Verify mise tools inside container
        run: |
          docker exec html-anything opencode --version
          docker exec html-anything pi --version

      - name: Clean up container
        if: always()
        run: |
          docker stop html-anything || true
          docker rm html-anything || true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          DATE_TAG=$(date +%Y%m%d)
          docker tag html-anything:latest "ghcr.io/${REPO_LOWER}:latest"
          docker tag html-anything:latest "ghcr.io/${REPO_LOWER}:${DATE_TAG}"
          docker push "ghcr.io/${REPO_LOWER}:latest"
          docker push "ghcr.io/${REPO_LOWER}:${DATE_TAG}"
