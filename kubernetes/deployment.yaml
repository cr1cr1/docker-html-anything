apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-anything
spec:
  replicas: 1
  selector:
    matchLabels:
      app: html-anything
  template:
    metadata:
      labels:
        app: html-anything
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: html-anything
          image: html-anything
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          envFrom:
            - secretRef:
                name: ai-keys
          volumeMounts:
            - name: opencode-config
              mountPath: /home/appuser/.opencode/opencode.jsonc
              subPath: opencode.jsonc
            - name: pi-config
              mountPath: /home/appuser/.pi/agent/models.json
              subPath: models.json
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/html-anything/next
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
      volumes:
        - name: opencode-config
          configMap:
            name: opencode-config
        - name: pi-config
          configMap:
            name: pi-config
        - name: tmp
          emptyDir: {}
        - name: next-cache
          emptyDir: {}
